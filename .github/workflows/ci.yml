name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .[dev]

      - name: Compile
        run: python -m compileall src

      - name: Generate inbound models
        run: ./generate_inbound_models.sh

      #- name: Check schema/model drift
      #  run: git diff --exit-code src/adapters/inbound/api/schemas

      - name: Core purity
        run: python check_core_purity.py

      - name: Tests
        run: pytest

