openapi: 3.1.0
info:
  title: Dependency Graph Service API
  version: 0.0.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema

# NOTE: Working copy for this feature.
# Authoritative contracts for codegen/CI live under: specs/001-service-skeleton/contracts/

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: ./health_response.schema.json

  /components/validate:
    post:
      summary: Validate a component payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ./component.schema.json
      responses:
        "204":
          description: Valid
        "400":
          description: Malformed/unparseable request
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json
        "422":
          description: Schema/constraint validation failure
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json

  /components:
    post:
      summary: Echo any JSON payload (and persist it)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ./json_value.schema.json
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: ./json_value.schema.json
        "400":
          description: Malformed/unparseable request
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json
        "422":
          description: Validation failure (e.g., missing body)
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json
        "500":
          description: Persistence failure or other internal error
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json

  /components/{component_id}:
    get:
      summary: Get a component by id
      parameters:
        - name: component_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: ./component.schema.json
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json
