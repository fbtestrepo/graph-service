openapi: 3.1.0
info:
  title: Dependency Graph Service API
  version: 0.0.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: ./health_response.schema.json

  /components/validate:
    post:
      summary: Validate a component payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ./component.schema.json
      responses:
        "204":
          description: Valid
        "400":
          description: Malformed/unparseable request
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json
        "422":
          description: Schema/constraint validation failure
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json

  /components:
    post:
      summary: Upsert a component node
      description: Upserts the submitted component node payload keyed by `node-id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ./component_node.schema.json
      responses:
        "201":
          description: Created (new node-id)
          content:
            application/json:
              schema:
                $ref: ./component_node.schema.json
        "200":
          description: Updated (existing node-id)
          content:
            application/json:
              schema:
                $ref: ./component_node.schema.json
        "400":
          description: Malformed/unparseable request
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json
        "422":
          description: Schema/constraint validation failure
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json
        "500":
          description: Internal server error (e.g., persistence failure)
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json

  /application-architectures:
    post:
      summary: Validate and upsert an application architecture document
      description: Upserts the submitted CALM application architecture keyed by `metadata.AssetID` + `metadata.version`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ./application_architecture.schema.json
      responses:
        "201":
          description: Created (new AssetID + version)
          content:
            application/json:
              schema:
                $ref: ./application_architecture.schema.json
        "200":
          description: Updated (existing AssetID + version)
          content:
            application/json:
              schema:
                $ref: ./application_architecture.schema.json
        "400":
          description: Malformed/unparseable JSON
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json
        "422":
          description: CALM schema or metadata validation failure
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json
        "500":
          description: Internal server error (e.g., persistence failure)
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json

  /micro-affinity-groups:
    post:
      summary: Validate and upsert a micro affinity group document
      description: Upserts the submitted micro affinity group keyed by `micro-ag-id` + `environment` + `architecture-version`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ./micro_affinity_group.schema.json
      responses:
        "201":
          description: Created (new micro-ag-id + environment + architecture-version)
          content:
            application/json:
              schema:
                $ref: ./micro_affinity_group.schema.json
        "200":
          description: Updated (existing micro-ag-id + environment + architecture-version)
          content:
            application/json:
              schema:
                $ref: ./micro_affinity_group.schema.json
        "400":
          description: Malformed/unparseable JSON
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json
        "422":
          description: Request-schema, field-format, or cross-collection workload validation failure
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json
        "500":
          description: Internal server error (e.g., persistence failure)
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json

  /components/{component_id}:
    get:
      summary: Get a component node by node-id
      parameters:
        - name: component_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: ./component_node.schema.json
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json

  /components/{node_id}/dependencies:
    get:
      summary: Get full transitive dependencies for a component node
      description: Returns the transitive dependency graph (upstream + downstream) as a stable edge list.
      parameters:
        - name: node_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: ./component_dependencies_response.schema.json
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: ./problem_details.schema.json

